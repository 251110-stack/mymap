<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장소 검색 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=[선생님 JS 키]&libraries=services&autoload=false"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; }

        /* 화면 2분할 레이아웃 */
        #container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 (검색창 + 리스트) */
        #sidebar { width: 350px; height: 100%; padding: 20px; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; z-index: 10; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        #keyword { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #search-btn { padding: 8px 15px; background: #fae100; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 검색 결과 리스트 스타일 */
        #places-list { list-style: none; }
        .place-item { padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .place-item:hover { background: #f0f0f0; }
        .place-name { font-weight: bold; color: #333; margin-bottom: 5px; }
        .place-addr { font-size: 0.9em; color: #666; }

        /* 오른쪽 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <h2>장소 검색</h2>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button id="search-btn" onclick="searchPlaces()">검색</button>
            </div>
            <ul id="places-list"></ul>
        </div>

        <div id="map"></div>
    </div>

    <script>
        let map; // 지도 객체
        let ps;  // 장소 검색 객체
        let infowindow; // 정보창 객체

        // [핵심] 카카오맵 SDK 로드 후 초기화
        kakao.maps.load(() => {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표 (서울시청)
                level: 5 // 요청하신 확대 레벨
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 1. 현재 위치 가져오기
            getCurrentLocation();
        });

        // 현재 위치를 파악하여 지도를 이동시키는 함수
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);

                    // 현재 위치에 마커 표시 및 지도 이동
                    displayMarker(locPosition, "내 위치");
                    map.setCenter(locPosition);
                }, (error) => {
                    console.error("위치 권한을 허용해주세요.");
                });
            }
        }

        // 지도에 마커를 표시하는 함수
        function displayMarker(locPosition, message) {
            const marker = new kakao.maps.Marker({
                map: map,
                position: locPosition
            });

            if (message) {
                infowindow.setContent(`<div style="padding:5px;">${message}</div>`);
                infowindow.open(map, marker);
            }
        }

        // 키워드 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 장소 검색 서비스 이용
            ps.keywordSearch(keyword, placesSearchCB);
        }

        // 검색 완료 시 호출되는 콜백 함수
        function placesSearchCB
