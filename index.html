<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 장소 검색 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5f28be17bb21d8f7ee4ad8cedadc9f89&libraries=services&autoload=false"></script>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }

        /* 전체 화면 2분할 레이아웃 */
        .wrapper { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽: 검색 및 리스트 영역 */
        .sidebar { 
            width: 350px; height: 100%; padding: 20px; 
            background: #ffffff; border-right: 1px solid #ddd; 
            display: flex; flex-direction: column; z-index: 10; 
        }
        .search-section { margin-bottom: 20px; }
        .search-section h2 { margin-bottom: 15px; color: #333; }
        .input-group { display: flex; gap: 5px; }
        #keyword { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #search-btn { padding: 10px 15px; background: #fae100; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 결과 리스트 스크롤 영역 */
        #places-list { flex: 1; overflow-y: auto; list-style: none; }
        .place-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .place-item:hover { background: #f9f9f9; }
        .place-name { font-weight: bold; font-size: 16px; color: #1a1a1a; }
        .place-address { font-size: 13px; color: #666; margin-top: 4px; }

        /* 오른쪽: 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="sidebar">
            <div class="search-section">
                <h2>📍 장소 검색</h2>
                <div class="input-group">
                    <input type="text" id="keyword" placeholder="어디를 찾으시나요?" onkeypress="if(event.keyCode==13) searchPlaces()">
                    <button id="search-btn" onclick="searchPlaces()">검색</button>
                </div>
            </div>
            <ul id="places-list">
                </ul>
        </div>

        <div id="map"></div>
    </div>

    <script>
        let map; // 지도 객체
        let ps;  // 장소 검색 객체
        let infowindow; // 클릭 시 띄울 정보창

        // [핵심] SDK가 로드된 후 실행되도록 보장
        kakao.maps.load(() => {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 권한 허용 전 기본 좌표(서울시청)
                level: 5 // 요청하신 확대 레벨
            };

            map = new kakao.maps.Map(container, options); // 지도 생성
            ps = new kakao.maps.services.Places(); // 장소 검색 서비스 생성
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 정보창 생성

            // 초기 로드 시 사용자 위치 요청
            requestUserLocation();
        });

        // 1. 브라우저 지오로케이션으로 현재 위치 가져오기
        function requestUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(lat, lon);

                    // 지도 중심 이동 및 현재 위치 마커 표시
                    map.setCenter(currentPos);
                    displayMarker(currentPos, "내 현재 위치");
                }, () => {
                    alert("위치 권한을 거부하셨습니다. 기본 위치로 표시합니다.");
                });
            }
        }

        // 2. 검색 버튼 클릭 시 실행되는 함수
        function searchPlaces() {
            const inputKeyword = document.getElementById('keyword').value;

            if (!inputKeyword.trim()) {
                alert("검색어를 입력해주세요!");
                return;
            }

            // 카카오맵 서비스로 키워드 검색 요청
            ps.keywordSearch(inputKeyword, (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    displaySearchResult(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert("검색 결과가 없습니다.");
                } else {
                    alert("검색 중 오류가 발생했습니다.");
                }
            });
        }

        // 3. 검색 결과를 리스트와 지도에 표시하는 함수
        function displaySearchResult(places
